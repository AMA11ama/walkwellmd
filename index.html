<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalkWellMD | Dr. ALHADDAD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Placeholder for Global Header (Injected by app.js) -->
    <header id="global-header"></header>

    <div class="content-wrapper">
        
        <!-- Hero Section -->
        <section class="hero">
            <h2 id="ui-hero-sub">Excellence in Motion</h2>
            <h1 id="ui-hero-main">Orthopedic Foot & Ankle</h1>
        </section>

        <main class="main-grid">
            
            <!-- Surgeon Profile (Primary Card) -->
            <div class="glass-card profile-card">
                <img src="AA headshot.jpg" alt="Dr. ALHADDAD" class="profile-img">
                <div class="profile-bio">
                    <h2 id="ui-prof-title">Surgeon Profile</h2>
                    <p id="ui-prof-desc">Consultant Orthopedic Surgeon specializing in advanced Foot and Ankle reconstruction and minimally invasive surgery.</p>
                </div>
            </div>

            <!-- Dynamic Category: Surgical Protocols -->
            <div class="section-label" id="label-protocols" style="grid-column: 1/-1; margin-top:30px; color:var(--emerald); font-weight:bold; letter-spacing:2px; font-size:0.8rem;">SURGICAL PROTOCOLS</div>
            <div id="protocol-list" class="main-grid" style="grid-column: 1/-1;">
                <!-- Dynamically filled from data.json -->
            </div>

            <!-- Dynamic Category: Patient Education -->
            <div class="section-label" id="label-education" style="grid-column: 1/-1; margin-top:40px; color:var(--emerald); font-weight:bold; letter-spacing:2px; font-size:0.8rem;">PATIENT EDUCATION</div>
            <div id="education-list" class="main-grid" style="grid-column: 1/-1;">
                <!-- Dynamically filled from data.json -->
            </div>

        </main>
    </div>

    <!-- Placeholder for Global Action Bar & Lang Toggle (Injected by app.js) -->
    <div id="global-action-bar"></div>

    <!-- Scripts -->
    <script src="app.js"></script>
    <script>
        /**
         * Dashboard Renderer
         * Fetches data.json and builds the cards based on current language
         */
        async function renderDashboard() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const lang = localStorage.getItem('wwmd_lang') || 'en';

                const protoContainer = document.getElementById('protocol-list');
                const eduContainer = document.getElementById('education-list');

                // Render Surgical Protocols
                data.protocols.forEach(item => {
                    protoContainer.innerHTML += `
                        <a href="${item.url}" class="glass-card">
                            <div style="font-size: 2rem; margin-bottom: 15px;">${item.icon}</div>
                            <h3>${lang === 'en' ? item.title_en : item.title_ar}</h3>
                            <p>${lang === 'en' ? 'View Protocol' : 'عرض البروتوكول'}</p>
                        </a>
                    `;
                });

                // Render Education Content
                data.education.forEach(item => {
                    eduContainer.innerHTML += `
                        <a href="${item.url}" class="glass-card">
                            <div style="font-size: 2rem; margin-bottom: 15px;">${item.icon}</div>
                            <h3>${lang === 'en' ? item.title_en : item.title_ar}</h3>
                            <p>${lang === 'en' ? 'Learn More' : 'اقرأ المزيد'}</p>
                        </a>
                    `;
                });

                // Localize Dashboard Strings
                if (lang === 'ar') {
                    document.getElementById('ui-hero-sub').innerText = "التميز في الحركة";
                    document.getElementById('ui-hero-main').innerText = "جراحة العظام والقدم والكاحل";
                    document.getElementById('ui-prof-title').innerText = "السيرة الذاتية";
                    document.getElementById('ui-prof-desc').innerText = "استشاري جراحة العظام متخصص في ترميم القدم والكاحل والجراحات طفيفة التوغل.";
                    document.getElementById('label-protocols').innerText = "بروتوكولات الجراحة";
                    document.getElementById('label-education').innerText = "تثقيف المرضى";
                }
            } catch (error) {
                console.error("Dashboard Render Error:", error);
            }
        }

        window.addEventListener('DOMContentLoaded', renderDashboard);
    </script>
</body>
</html>
