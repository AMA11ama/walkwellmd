<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalkWellMD | Dr. ALHADDAD</title>
    <!-- Light Luxury Design System -->
    <link rel="stylesheet" href="style.css">
    <!-- Three.js Engine for Biomechanical Animation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- Global Header: Dynamic Injection (Handles Branding & Back-Nav) -->
    <header id="global-header"></header>

    <div class="content-wrapper">
        
        <!-- Hero Section: Biomechanical Stage -->
        <section class="hero">
            <!-- Three.js Foot Animation Anchor -->
            <div id="foot-animation"></div>
            
            <!-- Branding Overlay -->
            <div class="hero-content">
                <h2 id="ui-hero-sub">Excellence in Motion</h2>
                <h1 id="ui-hero-main">Orthopedic Foot & Ankle</h1>
            </div>
        </section>

        <main class="main-grid">
            
            <!-- Surgeon Profile Card: Base Structure -->
            <div class="glass-card profile-card">
                <img src="" alt="Dr. ALHADDAD" class="profile-img" style="display: none;" id="ui-prof-img">
                <div class="profile-bio">
                    <h2 id="ui-prof-title">Surgeon Profile</h2>
                    <p id="ui-prof-desc">Consultant Orthopedic Surgeon specializing in advanced Foot and Ankle reconstruction and minimally invasive surgery.</p>
                </div>
            </div>

            <!-- Dashboard Tab Anchor: Segmented Controls Injected Here -->
            <div id="tab-anchor" style="grid-column: 1/-1;"></div>

            <!-- Dynamic List Container: Starts Empty (Exclusive State) -->
            <div id="protocol-list" class="main-grid" style="grid-column: 1/-1;">
                <!-- Content generated exclusively by app.js V4.2 -->
            </div>

        </main>
    </div>

    <!-- Global Action Bar: Call, WhatsApp, Review -->
    <div id="global-action-bar"></div>

    <!-- Master Engine -->
    <script src="app.js"></script>
</body>
</html>
