<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalkWellMD | Dr. ALHADDAD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="nav-header">WalkWellMD</header>
    <div class="content-wrapper">
        <div class="protocol-card" style="text-align: center;">
            <h2 style="color:var(--deep-teal);">Patient Care</h2>
            <div id="protocol-list"><p>Loading recovery plans...</p></div>
        </div>
        <div class="protocol-card" style="text-align: center;">
            <h3 style="color:var(--deep-teal);">Reviews & Social</h3>
            <a href="https://search.google.com/local/writereview?placeid=ChIJv3KH0jjQwxURJSJMiSHc2MQ" class="btn-primary" style="display:block; padding:15px; margin-bottom:10px; text-decoration:none; border-radius:10px; background:var(--primary-green); color:white;">⭐ Leave a Google Review</a>
            <a href="https://instagram.com/walkwellmd" style="display:block; padding:15px; text-decoration:none; border-radius:10px; border:2px solid var(--primary-green); color:var(--deep-teal);">📸 Instagram</a>
        </div>
    </div>
    <a href="tel:0127444444" class="fab-call">📞</a>
    <script>
        async function loadProtocols() {
            const list = document.getElementById('protocol-list');
            try {
                const response = await fetch('./protocols/index.json');
                const data = await response.json();
                list.innerHTML = '';
                data.forEach(item => {
                    const a = document.createElement('a');
                    a.href = item.url;
                    a.style = "display:block; padding:15px; margin-bottom:10px; background:var(--primary-green); color:white; text-decoration:none; border-radius:10px; font-weight:bold;";
                    a.innerText = "📋 " + item.title_en + " / " + item.title_ar;
                    list.appendChild(a);
                });
            } catch (e) { list.innerHTML = "<p style='color:red;'>Error loading protocols. Check protocols/index.json</p>"; }
        }
        window.onload = loadProtocols;
    </script>
</body>
</html>
